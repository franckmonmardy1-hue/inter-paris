<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#2a1f00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="brown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5C2E00"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="256" cy="210" r="170" fill="rgba(201,168,76,0.08)" filter="url(#glow)"/>

  <!-- Cheval -->
  <ellipse cx="256" cy="200" rx="110" ry="85" fill="url(#brown)" filter="url(#shadow)"/>

  <!-- Tête cheval -->
  <ellipse cx="340" cy="155" rx="55" ry="42" fill="url(#brown)"/>

  <!-- Crinière -->
  <ellipse cx="290" cy="130" rx="30" ry="20" fill="#3d1a00"/>
  <ellipse cx="260" cy="125" rx="25" ry="18" fill="#3d1a00"/>
  <ellipse cx="230" cy="128" rx="22" ry="16" fill="#3d1a00"/>

  <!-- Oeil -->
  <circle cx="355" cy="148" r="8" fill="#1a0a00"/>
  <circle cx="357" cy="146" r="3" fill="rgba(255,255,255,0.6)"/>

  <!-- Naseaux -->
  <ellipse cx="380" cy="170" rx="8" ry="5" fill="#3d1a00"/>

  <!-- Jambes -->
  <rect x="170" y="265" width="22" height="80" rx="8" fill="url(#brown)"/>
  <rect x="210" y="270" width="22" height="80" rx="8" fill="url(#brown)"/>
  <rect x="290" y="265" width="22" height="80" rx="8" fill="url(#brown)"/>
  <rect x="330" y="260" width="22" height="75" rx="8" fill="url(#brown)"/>

  <!-- Shine -->
  <ellipse cx="220" cy="175" rx="40" ry="25" fill="rgba(255,255,255,0.12)" transform="rotate(-20,220,175)"/>

  <!-- Badge PMU -->
  <rect x="116" y="368" width="280" height="68" rx="34" fill="url(#gold)" filter="url(#shadow)"/>
  <rect x="116" y="368" width="280" height="68" rx="34" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- PMU text -->
  <text x="256" y="413" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="3">INTER PARIS</text>

  <!-- Sous-titre -->
  <text x="256" y="480" font-family="Arial Black" font-size="20" font-weight="900" fill="#C9A84C" text-anchor="middle" letter-spacing="2">🐴 PMU EXPERT</text>
</svg>
